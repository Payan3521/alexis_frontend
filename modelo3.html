<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelo 3 — Strangeroses</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Times New Roman', Times, serif;
      background: #0a0a0a;
      color: #fff;
    }

    .profile {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 40px;
      transition: color 0.3s;
    }
    .back-btn:hover { color: #ff0000; }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 40px;
      margin-bottom: 60px;
    }

    .profile-header .img-placeholder {
      width: 180px;
      height: 240px;
      border-radius: 12px;
      background: linear-gradient(135deg, #111, #1a1a1a);
      border: 1px dashed rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.15);
      font-size: 2.5rem;
    }

    .profile-header .info h1 {
      font-size: 2.5rem;
      color: #ff0000;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(255,0,0,0.2);
    }

    .profile-header .info .tag {
      color: rgba(255,255,255,0.3);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    .profile-header .info .desc {
      color: rgba(255,255,255,0.5);
      margin-top: 12px;
      font-size: 1rem;
      line-height: 1.6;
    }

    .coming-soon {
      text-align: center;
      padding: 80px 20px;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 16px;
    }

    .coming-soon .big {
      font-size: 4rem;
      color: rgba(255,0,0,0.2);
      margin-bottom: 16px;
    }

    .coming-soon p {
      color: rgba(255,255,255,0.2);
      font-size: 1.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
        gap: 20px;
      }
      .profile-header .img-placeholder { width: 140px; height: 186px; }
      .profile-header .info h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="profile">
    <a href="index.html" class="back-btn">&larr; Volver</a>

    <div class="profile-header">
      <div class="img-placeholder">+</div>
      <div class="info">
        <h1>Modelo 3</h1>
        <p class="tag">&#x25CB; Próximamente</p>
        <p class="desc">Pronto estará disponible el perfil completo de esta modelo con sus videos y contenido.</p>
      </div>
    </div>

    <div class="coming-soon">
      <div class="big">+</div>
      <p>Próximamente</p>
    </div>
  </div>
</body>
</html>
