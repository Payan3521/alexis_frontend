<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strangeroses</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Times New Roman', Times, serif;
      background: #0a0a0a;
      color: #fff;
      overflow-x: hidden;
    }

    /* ===== HEADER / HERO ===== */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      background: radial-gradient(ellipse at 50% 30%, #1a0505 0%, #0a0a0a 70%);
      padding: 80px 20px 0;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -10%;
      width: 60%;
      height: 80%;
      background: radial-gradient(circle, rgba(255, 0, 0, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 60%;
      height: 70%;
      background: radial-gradient(circle, rgba(200, 0, 0, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .deco-shape {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.15;
    }

    .deco-shape-1 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #ff0000, transparent);
      top: 10%;
      left: 5%;
      animation: float 8s ease-in-out infinite;
    }

    .deco-shape-2 {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, #cc0000, transparent);
      bottom: 15%;
      right: 8%;
      animation: float 6s ease-in-out infinite reverse;
    }

    .deco-shape-3 {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, #ff3333, transparent);
      top: 20%;
      right: 25%;
      animation: float 10s ease-in-out infinite;
    }

    .deco-ring {
      position: absolute;
      border: 1px solid rgba(255, 0, 0, 0.1);
      border-radius: 50%;
      pointer-events: none;
      animation: spin 20s linear infinite;
    }

    .deco-ring-1 {
      width: 500px;
      height: 500px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .deco-ring-2 {
      width: 700px;
      height: 700px;
      border-color: rgba(200, 0, 0, 0.08);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-direction: reverse;
      animation-duration: 30s;
    }

    /* ===== DOLL IMAGES AROUND HERO ===== */
    .doll-img {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      opacity: 0.7;
      transition: opacity 0.4s;
    }

    .doll-img:hover {
      opacity: 1;
    }

    .doll-img img {
      display: block;
      max-width: 100%;
      height: auto;
      filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.2));
    }

    .doll-1 {
      top: 26%;
      left: 20%;
      width: 110px;
      animation: floatDoll 7s ease-in-out infinite;
    }

    .doll-2 {
      top: 26%;
      right: 20%;
      width: 110px;
      animation: floatDoll 9s ease-in-out infinite reverse;
    }

    .doll-3 {
      bottom: 35%;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      animation: floatDoll 8s ease-in-out infinite 2s;
    }

    @keyframes floatDoll {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-20px) rotate(3deg); }
      50% { transform: translateY(-10px) rotate(-2deg); }
      75% { transform: translateY(-25px) rotate(2deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Brand text - ABOVE the image */
    .hero-title {
      text-align: center;
      z-index: 1;
      margin-bottom: 36px;
    }

    .hero-title .title-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 6px;
    }

    .hero-title .title-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 0, 0, 0.4), transparent);
    }

    .hero-title .title-line::before {
      content: '\2666';
      display: block;
      text-align: center;
      color: rgba(255, 0, 0, 0.5);
      font-size: 0.6rem;
      margin-top: -5px;
    }

    .hero-title h1 {
      font-size: 5rem;
      font-weight: 900;
      font-family: 'Times New Roman', Times, serif;
      color: #ff0000;
      letter-spacing: 4px;
      text-transform: uppercase;
      line-height: 1;
      position: relative;
      text-shadow:
        0 0 20px rgba(255, 0, 0, 0.4),
        0 0 60px rgba(255, 0, 0, 0.15),
        2px 2px 0 rgba(100, 0, 0, 0.3);
    }

    .hero-title h1::after {
      content: '';
      display: block;
      width: 60%;
      height: 2px;
      margin: 10px auto 0;
      background: linear-gradient(to right, transparent, #ff0000, transparent);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
    }

    /* Image - full, no crop */
    .hero-image-wrapper {
      position: relative;
      z-index: 1;
    }

    .hero-image-wrapper img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(255, 0, 0, 0.15), 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* ===== MODELS SECTION ===== */
    .models {
      min-height: 100vh;
      padding: 100px 20px;
      background: #0a0a0a;
      position: relative;
    }

    .models::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 0, 0, 0.3), transparent);
    }

    .models-header {
      text-align: center;
      margin-bottom: 80px;
    }

    .models-header h2 {
      font-size: 3rem;
      font-weight: 800;
      font-family: 'Times New Roman', Times, serif;
      text-transform: uppercase;
      letter-spacing: -2px;
      color: #fff;
      margin-bottom: 12px;
    }

    .models-header h2 span {
      color: #ff0000;
    }

    .models-header p {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.9rem;
      font-family: 'Times New Roman', Times, serif;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .models-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      max-width: 900px;
      margin: 0 auto;
    }

    .models-grid .top-row {
      display: flex;
      justify-content: center;
      width: 100%;
      max-width: 320px;
    }

    .models-grid .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      width: 100%;
      max-width: 700px;
    }

    .model-card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      cursor: pointer;
    }

    .model-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 60px rgba(255, 0, 0, 0.15);
      border-color: rgba(255, 0, 0, 0.2);
    }

    .model-image {
      aspect-ratio: 3/4;
      overflow: hidden;
      position: relative;
      background: #111;
    }

    .model-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    /* ===== CARD WRAPPER + SHAPES BEHIND ===== */
    .card-wrap {
      position: relative;
      width: 100%;
    }

    .card-wrap .card-shape {
      position: absolute;
      z-index: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .card-wrap .card-shape svg {
      width: 100%;
      height: 100%;
    }

    .card-wrap .card-shape svg polygon,
    .card-wrap .card-shape svg path {
      fill: #888;
      stroke: #888;
      stroke-width: 1;
    }

    .card-wrap .card-shape.star {
      width: 135%;
      height: 135%;
      opacity: 0.15;
    }

    .card-wrap .card-shape.heart {
      width: 125%;
      height: 125%;
      opacity: 0.12;
    }

    .card-wrap .model-card {
      position: relative;
      z-index: 1;
      width: 100%;
    }

    /* ===== VIDEO PANEL ON HOVER ===== */
    .video-panel {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 10;
      background: #0d0d0d;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: none;
      border-radius: 0 0 16px 16px;
      padding: 14px;
      display: flex;
      gap: 10px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
    }

    .card-wrap:hover .video-panel {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .video-panel .v-item {
      flex: 1;
      cursor: pointer;
      text-align: center;
    }

    .video-panel .v-thumb {
      aspect-ratio: 16/9;
      background: #1a1a1a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: border-color 0.3s;
    }

    .video-panel .v-thumb:hover {
      border-color: rgba(255, 0, 0, 0.3);
    }

    .video-panel .v-play {
      font-size: 1.6rem;
      color: rgba(255, 255, 255, 0.2);
      transition: color 0.3s;
      line-height: 1;
    }

    .video-panel .v-thumb:hover .v-play {
      color: #ff0000;
    }

    .video-panel .v-label {
      font-size: 0.65rem;
      margin-top: 5px;
      color: rgba(255, 255, 255, 0.3);
      font-family: 'Times New Roman', Times, serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .model-card:hover .model-image img {
      transform: scale(1.05);
    }

    .model-image::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(to top, #0a0a0a, transparent);
      pointer-events: none;
    }

    .model-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2px;
      background: #ff0000;
      transition: width 0.4s ease;
      z-index: 2;
    }

    .model-card:hover::before {
      width: 80%;
    }

    .model-info {
      padding: 20px 24px 24px;
      position: relative;
      z-index: 1;
    }

    .model-info h3 {
      font-size: 1.3rem;
      font-weight: 700;
      font-family: 'Times New Roman', Times, serif;
      color: #fff;
      margin-bottom: 4px;
    }

    .model-info .model-tag {
      font-size: 0.8rem;
      font-family: 'Times New Roman', Times, serif;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .model-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #111, #1a1a1a);
      border: 1px dashed rgba(255, 255, 255, 0.1);
    }

    .model-placeholder-content {
      text-align: center;
      color: rgba(255, 255, 255, 0.2);
    }

    .model-placeholder-content .plus {
      font-size: 3rem;
      font-weight: 100;
      margin-bottom: 8px;
      color: rgba(255, 0, 0, 0.3);
      font-family: 'Times New Roman', Times, serif;
    }

    .model-placeholder-content p {
      font-size: 0.85rem;
      font-family: 'Times New Roman', Times, serif;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 968px) {
      .hero-title h1 {
        font-size: 3.5rem;
      }

      .doll-1 { width: 100px; top: 24%; left: 12%; }
      .doll-2 { width: 100px; top: 24%; right: 12%; }
      .doll-3 { width: 90px; bottom: 32%; }
    }

    @media (max-width: 768px) {
      .hero {
        padding: 60px 15px 0;
      }

      .hero-title h1 {
        font-size: 3rem;
      }

      .doll-1 { width: 80px; top: 22%; left: 8%; }
      .doll-2 { width: 80px; top: 22%; right: 8%; }
      .doll-3 { width: 75px; bottom: 35%; }

      .models-header h2 {
        font-size: 2.5rem;
      }

      .models-header {
        margin-bottom: 50px;
      }

      .models {
        padding: 70px 20px;
      }
    }

    @media (max-width: 600px) {
      .hero {
        padding: 40px 12px 0;
        min-height: auto;
      }

      .hero-title {
        margin-bottom: 20px;
      }

      .hero-title h1 {
        font-size: 2.2rem;
        letter-spacing: 2px;
      }

      .hero-title .title-wrap {
        gap: 12px;
      }

      .hero-title .title-line {
        width: 30px;
      }

      .hero-image-wrapper img {
        max-width: 220px;
      }

      .doll-1 { width: 55px; top: 18%; left: 5%; opacity: 0.6; }
      .doll-2 { width: 55px; top: 18%; right: 5%; opacity: 0.6; }
      .doll-3 { width: 50px; bottom: 36%; opacity: 0.6; }

      .models {
        padding: 50px 15px;
      }

      .models-header {
        margin-bottom: 35px;
      }

      .models-header h2 {
        font-size: 1.8rem;
      }

      .models-grid {
        gap: 20px;
      }

      .models-grid .bottom-row {
        grid-template-columns: 1fr;
        max-width: 280px;
        gap: 20px;
      }

      .models-grid .top-row {
        max-width: 250px;
      }

      .model-info {
        padding: 14px 16px 18px;
      }

      .model-info h3 {
        font-size: 1.1rem;
      }

      .model-card {
        border-radius: 12px;
      }

      .model-card:hover {
        transform: none;
      }

      .model-card::before {
        display: none;
      }

      .model-card:hover .model-image img {
        transform: none;
      }

      .video-panel {
        position: static;
        opacity: 1;
        visibility: visible;
        transform: none;
        border-radius: 0 0 12px 12px;
        padding: 10px;
        gap: 6px;
      }

      .video-panel .v-thumb {
        aspect-ratio: 16/9;
        min-height: 50px;
      }

      .video-panel .v-play {
        font-size: 1.2rem;
      }

      .social-bar {
        gap: 8px;
        padding: 10px 14px;
        margin-top: 6px;
        border-radius: 40px;
      }

      .social-bar a {
        width: 38px;
        height: 38px;
      }

      .social-bar a img {
        width: 18px;
        height: 18px;
      }
    }

    @media (max-width: 400px) {
      .hero-title h1 {
        font-size: 1.8rem;
      }

      .hero-image-wrapper img {
        max-width: 170px;
      }

      .doll-1 { width: 40px; top: 15%; left: 3%; }
      .doll-2 { width: 40px; top: 15%; right: 3%; }
      .doll-3 { width: 35px; bottom: 40%; }

      .models-header h2 {
        font-size: 1.5rem;
      }

      .models-grid .bottom-row {
        max-width: 230px;
      }

      .models-grid .top-row {
        max-width: 210px;
      }

      .social-bar {
        gap: 6px;
        padding: 8px 10px;
      }

      .social-bar a {
        width: 32px;
        height: 32px;
      }

      .social-bar a img {
        width: 15px;
        height: 15px;
      }
    }

    /* ===== SOCIAL BAR ===== */
    .social-bar {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 14px;
      padding: 16px 20px;
      margin-top: 10px;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 60px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .social-bar a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s, box-shadow 0.3s, background 0.3s;
      position: relative;
    }

    .social-bar a::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent, rgba(255, 0, 0, 0.2), transparent, rgba(255, 0, 0, 0.2), transparent);
      opacity: 0;
      transition: opacity 0.4s;
      z-index: -1;
    }

    .social-bar a:hover::after {
      opacity: 1;
      animation: spin 2s linear infinite;
    }

    .social-bar a:hover {
      transform: scale(1.2);
      border-color: rgba(255, 0, 0, 0.3);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.15), 0 0 60px rgba(255, 0, 0, 0.05);
      background: rgba(255, 255, 255, 0.06);
    }

    .social-bar a img {
      display: block;
      width: 26px;
      height: 26px;
      object-fit: contain;
      filter: brightness(0.6) grayscale(0.3);
      transition: filter 0.3s, transform 0.3s;
    }

    .social-bar a:hover img {
      filter: brightness(1) grayscale(0);
      transform: scale(1.1);
    }

    /* ===== SCROLL ANIMATION ===== */
    .fade-in {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .fade-in:nth-child(2) { transition-delay: 0.15s; }
    .fade-in:nth-child(3) { transition-delay: 0.3s; }

    .clip-star {
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }
    .clip-heart {
      clip-path: url(#heartClip);
    }
  </style>
</head>
<body>

  <!-- ===== HERO ===== -->
  <section class="hero" id="hero">
    <div class="deco-shape deco-shape-1"></div>
    <div class="deco-shape deco-shape-2"></div>
    <div class="deco-shape deco-shape-3"></div>
    <div class="deco-ring deco-ring-1"></div>
    <div class="deco-ring deco-ring-2"></div>

    <!-- Doll images around -->
    <div class="doll-img doll-1"><img src="img/imagenhentai1-removebg-preview.png" alt="Muñeca 1"></div>
    <div class="doll-img doll-2"><img src="img/imagenhetail2-removebg-preview.png" alt="Muñeca 2"></div>
    <div class="doll-img doll-3"><img src="img/imagenhentail3-removebg-preview.png" alt="Muñeca 3"></div>

    <!-- Image - full, no frame -->

    <!-- Title BELOW the image -->

      </div>
    </div>

    <!-- Logos debajo del título -->
    <div class="social-bar">
      <a href="#" target="_blank" rel="noopener"><img src="img/logoinstagram-removebg-preview.png" alt="Instagram"></a>
      <a href="#" target="_blank" rel="noopener"><img src="img/logoonlyfans-removebg-preview.png" alt="OnlyFans"></a>
      <a href="#" target="_blank" rel="noopener"><img src="img/logoporhub-removebg-preview.png" alt="Pornhub"></a>
      <a href="#" target="_blank" rel="noopener"><img src="img/logotelegram-removebg-preview.png" alt="Telegram"></a>
    </div>

  </section>

  <!-- ===== MODELS ===== -->
  <section class="models" id="models">
    <div class="models-header fade-in">
      <h2><span>Modelos</span></h2>
    </div>

    <div class="models-grid">
      <div class="top-row">
        <div class="card-wrap">
          <div class="card-shape star">
            <svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
              <polygon points="100,10 123,75 190,75 135,115 155,185 100,145 45,185 65,115 10,75 77,75" />
            </svg>
          </div>
          <a href="modelo1.html" class="model-card fade-in" style="text-decoration:none;color:inherit;display:block">
            <div class="model-image clip-star">
              <img src="img/Imagen pegada (2).png" alt="Modelo 1" loading="lazy">
            </div>
            <div class="model-info">
              <h3>Modelo 1</h3>
              <span class="model-tag">&#x2605; Destacada</span>
            </div>
          </a>
          <div class="video-panel">
            <div class="v-item">
              <div class="v-thumb"><span class="v-play">&#9654;</span></div>
              <p class="v-label">Video 1</p>
            </div>
            <div class="v-item">
              <div class="v-thumb"><span class="v-play">&#9654;</span></div>
              <p class="v-label">Video 2</p>
            </div>
            <div class="v-item">
              <div class="v-thumb"><span class="v-play">&#9654;</span></div>
              <p class="v-label">Video 3</p>
            </div>
          </div>
        </div>
      </div>

      <div class="bottom-row">
        <div class="card-wrap">

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
